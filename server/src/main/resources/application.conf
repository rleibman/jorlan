jorlan {
  db {
    dataSource {
      driver = "org.mariadb.jdbc.Driver"
      driver = ${?JORLAN_DB_DRIVER}
      url = "jdbc:mariadb://localhost:3306/jorlan"
      url = ${?JORLAN_DB_URL}
      user = "jorlan"
      user = ${?JORLAN_DB_USER}
      password = "jorlan"
      password = ${?JORLAN_DB_PASSWORD}
      maximumPoolSize = 10
      maximumPoolSize = ${?JORLAN_DB_MAX_POOL_SIZE}
      minimumIdle = 2
      minimumIdle = ${?JORLAN_DB_MIN_IDLE}
      connectionTimeoutMillis = 30000
      connectionTimeoutMillis = ${?JORLAN_DB_CONNECTION_TIMEOUT_MILLIS}
      idleTimeoutMillis = 600000
      idleTimeoutMillis = ${?JORLAN_DB_IDLE_TIMEOUT_MILLIS}
      keepaliveTimeMillis = 300000
      keepaliveTimeMillis = ${?JORLAN_DB_KEEPALIVE_TIME_MILLIS}
    }
  }

  flyway {
    locations = ["classpath:sql"]
    enabled = true
    enabled = ${?JORLAN_FLYWAY_ENABLED}
    cleanDisabled = true
    validateOnMigrate = true
    mixed = false
    target = ""
    target = ${?JORLAN_FLYWAY_TARGET}
    baselineOnMigrate = true
    baselineVersion = "0"
    baselineDescription = "Initial"
  }

  http {
    host = "0.0.0.0"
    host = ${?JORLAN_HTTP_HOST}
    port = 8080
    port = ${?JORLAN_HTTP_PORT}
    staticContentDir = "/home/rleibman/projects/jorlan/debugDist"
    staticContentDir = ${?JORLAN_STATIC_CONTENT_DIR}
  }

  ai {
    ollamaBaseUrl = "http://localhost:11434"
    ollamaBaseUrl = ${?JORLAN_AI_OLLAMA_BASE_URL}
    ollamaModel = "qwen3:8b"
    ollamaModel = ${?JORLAN_AI_OLLAMA_MODEL}
    qdrantHost = "localhost"
    qdrantHost = ${?JORLAN_AI_QDRANT_HOST}
    qdrantRPCPort = 6334
    qdrantRPCPort = ${?JORLAN_AI_QDRANT_RPC_PORT}
  }

  agent {
    maxToolSteps = 10
    maxToolSteps = ${?JORLAN_AGENT_MAX_TOOL_STEPS}
  }

  workspace {
    root = "/var/lib/jorlan/workspaces"
    root = ${?JORLAN_WORKSPACE_ROOT}
  }

  shell {
    allowedBinaries = ["echo", "ls", "cat", "grep", "find", "pwd"]
    timeoutSeconds = 30
    timeoutSeconds = ${?JORLAN_SHELL_TIMEOUT_SECONDS}
  }

  auth {
    secretKey = ${?JORLAN_AUTH_SECRET_KEY}
    # zio-auth code defaults are 1 minute / 5 minutes — far too short for interactive use.
    # Override here to 8 hours access / 30 days refresh.
    accessTTL = 28800000
    accessTTL = ${?JORLAN_AUTH_ACCESS_TTL_MS}
    refreshTTL = 2592000000
    refreshTTL = ${?JORLAN_AUTH_REFRESH_TTL_MS}
    # Set to false for local dev (HTTP); override to true in production (HTTPS).
    secureCookie = false
    secureCookie = ${?JORLAN_AUTH_SECURE_COOKIE}
  }

  web {
    root = "debugDist"
    root = ${?JORLAN_WEB_ROOT}
  }

  google {
    clientId = ""
    clientId = ${?JORLAN_GOOGLE_CLIENT_ID}
    clientSecret = ""
    clientSecret = ${?JORLAN_GOOGLE_CLIENT_SECRET}
    redirectUri = "http://localhost:8080/api/oauth/callback/google"
    redirectUri = ${?JORLAN_GOOGLE_REDIRECT_URI}
  }

  email {
    defaultProvider = "gmail"
    defaultProvider = ${?JORLAN_EMAIL_DEFAULT_PROVIDER}
    imap {
      host = ""
      host = ${?JORLAN_IMAP_HOST}
      port = 993
      port = ${?JORLAN_IMAP_PORT}
      ssl = true
      ssl = ${?JORLAN_IMAP_SSL}
    }
    smtp {
      host = ""
      host = ${?JORLAN_SMTP_HOST}
      port = 587
      port = ${?JORLAN_SMTP_PORT}
      startTls = true
      startTls = ${?JORLAN_SMTP_START_TLS}
    }
    pgp {
      enabled = false
      enabled = ${?JORLAN_PGP_ENABLED}
    }
  }
}
