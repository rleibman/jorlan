jorlan {
  db {
    dataSource {
      driver = "org.mariadb.jdbc.Driver"
      driver = ${?JORLAN_DB_DRIVER}
      url = "jdbc:mariadb://localhost:3306/jorlan"
      url = ${?JORLAN_DB_URL}
      user = "jorlan"
      user = ${?JORLAN_DB_USER}
      password = "jorlan"
      password = ${?JORLAN_DB_PASSWORD}
      maximumPoolSize = 10
      maximumPoolSize = ${?JORLAN_DB_MAX_POOL_SIZE}
      minimumIdle = 2
      minimumIdle = ${?JORLAN_DB_MIN_IDLE}
      connectionTimeoutMillis = 30000
      connectionTimeoutMillis = ${?JORLAN_DB_CONNECTION_TIMEOUT_MILLIS}
      idleTimeoutMillis = 600000
      idleTimeoutMillis = ${?JORLAN_DB_IDLE_TIMEOUT_MILLIS}
      keepaliveTimeMillis = 300000
      keepaliveTimeMillis = ${?JORLAN_DB_KEEPALIVE_TIME_MILLIS}
    }
  }

  flyway {
    locations = ["classpath:sql"]
    enabled = true
    enabled = ${?JORLAN_FLYWAY_ENABLED}
    cleanDisabled = true
    validateOnMigrate = true
    mixed = false
    target = ""
    baselineOnMigrate = true
    baselineVersion = "0"
    baselineDescription = "Initial"
  }

  http {
    host = "0.0.0.0"
    host = ${?JORLAN_HTTP_HOST}
    port = 8080
    port = ${?JORLAN_HTTP_PORT}
  }

  auth {
    secretKey = "change-me-in-production-use-a-long-random-string"
    secretKey = ${?JORLAN_AUTH_SECRET_KEY}
    accessTtlMinutes = 60
    accessTtlMinutes = ${?JORLAN_AUTH_ACCESS_TTL_MINUTES}
    refreshTtlDays = 30
    refreshTtlDays = ${?JORLAN_AUTH_REFRESH_TTL_DAYS}

    # OAuth providers — omit a block entirely to disable that provider.
    # google {
    #   clientId = ${JORLAN_GOOGLE_CLIENT_ID}
    #   clientSecret = ${JORLAN_GOOGLE_CLIENT_SECRET}
    #   authorizationUri = "https://accounts.google.com/o/oauth2/v2/auth"
    #   tokenUri = "https://oauth2.googleapis.com/token"
    #   userInfoUri = "https://www.googleapis.com/oauth2/v3/userinfo"
    #   redirectUri = "http://localhost:8080/oauth/google/callback"
    #   scopes = ["openid", "email", "profile"]
    # }
  }
}
