schema {
  query: Queries
  mutation: Mutations
  subscription: Subscriptions
}

"An instantaneous point on the time-line represented by a standard date time string"
scalar AgentId
scalar AgentSessionId
scalar ApprovalRequestId
scalar CapabilityName
scalar EventLogId
scalar Instant
scalar Long
scalar PermissionId
scalar RoleId
scalar Unit
scalar UserId

enum ApprovalStatus {
  Approved
  Cancelled
  Expired
  Pending
  Rejected
}

enum EventType {
  AgentCompleted
  AgentFailed
  AgentStarted
  ApprovalDenied
  ApprovalGranted
  ApprovalRequested
  CapabilityAllowed
  CapabilityDenied
  CapabilityGranted
  CapabilityRevoked
  MemoryExpired
  MemoryWritten
  PermissionGranted
  PermissionRevoked
  RoleAssigned
  RoleRevoked
  SkillFailed
  SkillInvoked
  SkillSucceeded
  SystemAlert
  UserConnected
  UserCreated
  UserDisconnected
  UserUpdated
}

type ApprovalRequest {
  id: ApprovalRequestId!
  capability: CapabilityName!
  scopeJson: String
  agentId: AgentId
  requestorUserId: UserId!
  sessionId: AgentSessionId
  riskClass: String!
  status: ApprovalStatus!
  createdAt: Instant!
  expiresAt: Instant
}

type EventLogJson {
  id: EventLogId!
  eventType: EventType!
  actorId: UserId
  agentId: AgentId
  sessionId: AgentSessionId
  resource: String
  payloadJson: String
  occurredAt: Instant!
}

type Mutations {
  createUser(displayName: String!, email: String): User
  updateUser(id: UserId!, displayName: String!, email: String, active: Boolean!): User
  createRole(name: String!, description: String): Role
  assignRole(userId: UserId!, roleId: RoleId!): Unit
  revokeRole(userId: UserId!, roleId: RoleId!): Unit
  grantPermission(resource: String!, action: String!, userId: UserId, roleId: RoleId): Permission
  revokePermission(id: PermissionId!): Long
}

type Permission {
  id: PermissionId!
  roleId: RoleId
  userId: UserId
  resource: String!
  action: String!
  scope: String
}

type Queries {
  user(id: UserId!): User
  users(page: Int, pageSize: Int): [User!]
  role(id: RoleId!): Role
  roles(userId: UserId!, page: Int, pageSize: Int): [Role!]
  permissions(userId: UserId!, page: Int, pageSize: Int): [Permission!]
}

type Role {
  id: RoleId!
  name: String!
  description: String
}

type Subscriptions {
  approvalNotifications: ApprovalRequest
  eventLogTail: EventLogJson
}

type User {
  id: UserId!
  displayName: String!
  email: String
  createdAt: Instant!
  updatedAt: Instant!
  active: Boolean!
}

