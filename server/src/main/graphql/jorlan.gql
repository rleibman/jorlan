schema {
  query: Queries
  mutation: Mutations
  subscription: Subscriptions
}

"An instantaneous point on the time-line represented by a standard date time string"
scalar Instant

scalar Long

scalar Unit

enum ApprovalStatus {
  Approved
  Cancelled
  Expired
  Pending
  Rejected
}

enum EventType {
  AgentCompleted
  AgentFailed
  AgentStarted
  ApprovalDenied
  ApprovalGranted
  ApprovalRequested
  CapabilityAllowed
  CapabilityDenied
  CapabilityGranted
  CapabilityRevoked
  MemoryExpired
  MemoryWritten
  PermissionGranted
  PermissionRevoked
  RoleAssigned
  RoleRevoked
  SkillFailed
  SkillInvoked
  SkillSucceeded
  SystemAlert
  UserConnected
  UserDisconnected
}

type ApprovalRequest {
  id: Long!
  capability: String!
  scopeJson: String
  agentId: Long
  requestorUserId: Long!
  sessionId: Long
  riskClass: String!
  status: ApprovalStatus!
  createdAt: Instant!
  expiresAt: Instant
}

type EventLogJson {
  id: Long!
  eventType: EventType!
  actorId: Long
  agentId: Long
  sessionId: Long
  resource: String
  payloadJson: String
  occurredAt: Instant!
}

type Mutations {
  createUser(displayName: String!, email: String): User
  updateUser(id: Long!, displayName: String!, email: String, active: Boolean!): User
  createRole(name: String!, description: String): Role
  assignRole(userId: Long!, roleId: Long!): Unit
  revokeRole(userId: Long!, roleId: Long!): Unit
  grantPermission(resource: String!, action: String!, userId: Long, roleId: Long): Permission
  revokePermission(value: Long!): Long
}

type Permission {
  id: Long!
  roleId: Long
  userId: Long
  resource: String!
  action: String!
  scope: String
}

type Queries {
  user(value: Long!): User
  users: [User!]
  role(value: Long!): Role
  roles(value: Long!): [Role!]
  permissions(value: Long!): [Permission!]
}

type Role {
  id: Long!
  name: String!
  description: String
}

type Subscriptions {
  approvalNotifications: ApprovalRequest
  eventLogTail: EventLogJson
}

type User {
  id: Long!
  displayName: String!
  email: String
  createdAt: Instant!
  updatedAt: Instant!
  active: Boolean!
}

