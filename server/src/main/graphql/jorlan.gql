schema {
  query: Queries
  mutation: Mutations
  subscription: Subscriptions
}

scalar AgentId

scalar AgentSessionId

scalar ApprovalRequestId

scalar CapabilityGrantId

scalar CapabilityName

scalar ChannelIdentityId

scalar EventLogId

"An instantaneous point on the time-line represented by a standard date time string"
scalar Instant

scalar Long

scalar MemoryRecordId

scalar ModelId

scalar PermissionId

scalar RiskClass

scalar RoleId

scalar SchedulerJobId

scalar SchedulerTriggerId

scalar SkillId

scalar TriggerType

scalar Unit

scalar UserId

scalar WorkspaceId

enum ApprovalMode {
  Denied
  PerInvocation
  Once
  Session
  Timed
  Persistent
}

enum ApprovalStatus {
  Pending
  Approved
  Rejected
  Expired
  Cancelled
}

enum ChannelType {
  Shell
  Telegram
  Slack
  Email
  WhatsApp
  Sms
  GraphQL
  Google
  GitHub
  Discord
}

enum EventType {
  AgentStarted
  AgentCompleted
  AgentFailed
  SessionCreated
  SessionSuspended
  SessionTerminated
  UserMessageReceived
  AgentResponseCompleted
  ModelCallStarted
  ModelCallCompleted
  ModelCallFailed
  SkillInvoked
  SkillSucceeded
  SkillFailed
  ToolLoopExceeded
  ShellCommandInvoked
  ShellCommandCompleted
  ApprovalRequested
  ApprovalGranted
  ApprovalDenied
  UserCreated
  UserUpdated
  UserConnected
  UserDisconnected
  MemoryWritten
  MemoryDeleted
  MemoryRescoped
  MemoryCheckpointed
  MemoryExpired
  RoleAssigned
  RoleRevoked
  CapabilityAllowed
  CapabilityDenied
  CapabilityGranted
  CapabilityRevoked
  PermissionGranted
  PermissionRevoked
  SchedulerJobQueued
  SchedulerJobStarted
  SchedulerJobCompleted
  SchedulerJobFailed
  SchedulerJobCancelled
  SchedulerJobPaused
  SchedulerJobResumed
  SchedulerJobTriggered
  SchedulerJobDeleted
  SchedulerTriggerAdded
  SchedulerTriggerDeleted
  SchedulerJobUpdated
  EmailMessageRead
  EmailMessageSent
  EmailDraftCreated
  EmailMessageArchived
  EmailMessageDeleted
  CalendarEventRead
  CalendarEventCreated
  CalendarEventUpdated
  CalendarEventDeleted
  DriveFileRead
  DriveFileListed
  SystemAlert
  ServerInitialized
}

enum Formality {
  Casual
  Professional
  Academic
  Technical
  Quirky
  Fresh
  Rude
  Boomer
  GenX
  Millennial
  GenZ
  GenAlpha
  Pirate
  Custom
}

enum GranteeType {
  User
  Role
}

enum JobStatus {
  Pending
  Running
  Succeeded
  Failed
  Cancelled
  Paused
}

enum MemoryScope {
  User
  Shared
  Workspace
  Private
}

enum MissedRunPolicy {
  Skip
  RunOnce
  RunAllMissed
}

enum OAuthProvider {
  Google
  Discord
  Telegram
}

enum RetryBackoffPolicy {
  Fixed
  Exponential
}

enum SessionStatus {
  Created
  Active
  Paused
  Blocked
  Completed
  Failed
  Cancelled
}

input McpEnvVarInput {
  key: String!
  value: String!
}

type AgentSession {
  id: AgentSessionId!
  agentId: AgentId!
  userId: UserId!
  workspaceId: WorkspaceId
  status: SessionStatus!
  modelId: ModelId
  chatRef: String
  createdAt: Instant!
  updatedAt: Instant!
}

type ApprovalRequest {
  id: ApprovalRequestId!
  capability: CapabilityName!
  scopeJson: String
  agentId: AgentId
  requestorUserId: UserId!
  sessionId: AgentSessionId
  riskClass: RiskClass!
  status: ApprovalStatus!
  createdAt: Instant!
  expiresAt: Instant
}

type CapabilityGrant {
  id: CapabilityGrantId!
  capability: CapabilityName!
  scopeJson: String
  granteeId: Long!
  granteeType: GranteeType!
  grantorId: UserId
  approvalMode: ApprovalMode!
  expiresAt: Instant
  resourceConstraints: String
  createdAt: Instant!
}

type ChannelIdentity {
  id: ChannelIdentityId!
  userId: UserId!
  channelType: ChannelType!
  channelUserId: String!
  verified: Boolean!
  providerData: String
  createdAt: Instant!
}

type CheckpointPolicyConfig {
  onSessionEnd: Boolean!
  onUserRequest: Boolean!
  timedIntervalTurns: Int
  beforeExternalEffect: Boolean!
}

type ContactIdentityResult {
  channelType: String!
  channelUserId: String!
}

type ContactResult {
  userId: Long!
  displayName: String!
  identities: [ContactIdentityResult!]!
}

type DashboardStats {
  activeSessionCount: Int!
  eventCountToday: Int!
  skillInvocationCount: Int!
  schedulerSuccessRate: Float!
  eventVolumeSeries: [TimeSeriesPoint!]!
  skillInvocationsByName: [NamedCount!]!
  sessionStatusCounts: [NamedCount!]!
  jobOutcomeCounts: [NamedCount!]!
}

type EventLogJson {
  id: EventLogId!
  eventType: EventType!
  actorId: UserId
  agentId: AgentId
  sessionId: AgentSessionId
  resource: String
  payloadJson: String
  occurredAt: Instant!
}

type McpEnvVar {
  key: String!
  value: String!
}

type McpServerView {
  name: String!
  transport: String!
  command: String
  args: [String!]!
  env: [McpEnvVar!]!
  url: String
  enabled: Boolean!
}

type MemoryRecord {
  id: MemoryRecordId!
  scope: MemoryScope!
  userId: UserId
  workspaceId: WorkspaceId
  agentId: AgentId
  recordKey: String!
  value: String!
  ttl: Instant
  createdAt: Instant!
  updatedAt: Instant!
  importance: Int!
}

type ModelInfo {
  id: ModelId!
  provider: String!
  contextWindow: Int!
  supportsStreaming: Boolean!
}

type Mutations {
  createUser(displayName: String!, email: String): User
  updateUser(id: UserId!, displayName: String!, email: String, active: Boolean!): User
  deactivateUser(value: UserId!): Boolean
  createRole(name: String!, description: String): Role
  updateRole(id: RoleId!, name: String!, description: String): Role
  deleteRole(value: RoleId!): Boolean
  assignRole(userId: UserId!, roleId: RoleId!): Unit
  revokeRole(userId: UserId!, roleId: RoleId!): Unit
  grantPermission(resource: String!, action: String!, userId: UserId, roleId: RoleId): Permission
  revokePermission(value: PermissionId!): Long
  createSession(modelId: ModelId): AgentSession
  submitMessage(sessionId: AgentSessionId!, content: String!): Unit
  updatePersonality(name: String!, formality: Formality!, languages: [String!]!, expertise: [String!]!, prompt: String!): Personality
  storeMemory(key: String!, text: String!, scope: MemoryScope!): MemoryRecord
  forgetMemory(value: MemoryRecordId!): Boolean
  markMemoryShared(value: MemoryRecordId!): MemoryRecord
  markMemoryPrivate(value: MemoryRecordId!): MemoryRecord
  createJob(name: String!, prompt: String!, inputJson: String, maxRetries: Int!, backoffSeconds: Int!, backoffPolicy: RetryBackoffPolicy!, missedRunPolicy: MissedRunPolicy!): SchedulerJob
  addTrigger(jobId: SchedulerJobId!, triggerType: TriggerType!, expression: String!): SchedulerTrigger
  pauseJob(value: SchedulerJobId!): Boolean
  resumeJob(value: SchedulerJobId!): Boolean
  cancelJob(value: SchedulerJobId!): Boolean
  triggerNow(value: SchedulerJobId!): Boolean
  deleteJob(value: SchedulerJobId!): Boolean
  updateJob(id: SchedulerJobId!, name: String!, prompt: String!, maxRetries: Int!, backoffSeconds: Int!, backoffPolicy: RetryBackoffPolicy!, missedRunPolicy: MissedRunPolicy!): SchedulerJob
  deleteTrigger(value: SchedulerTriggerId!): Boolean
  decideApproval(requestId: ApprovalRequestId!, approved: Boolean!, note: String): Boolean
  terminateSession(value: AgentSessionId!): Boolean
  notifyUser(userId: UserId!, message: String!): Boolean
  startOAuth(value: String!): OAuthStartResult
  revokeOAuth(value: String!): Boolean
  invokeTool(toolName: String!, argsJson: String!): String
  grantCapability(userId: UserId!, capability: CapabilityName!, approvalMode: ApprovalMode!): CapabilityGrant
  grantCapabilityToRole(roleId: RoleId!, capability: CapabilityName!, approvalMode: ApprovalMode!): CapabilityGrant
  revokeCapabilityGrant(value: CapabilityGrantId!): Boolean
  linkChannelIdentity(userId: UserId!, channelType: String!, channelUserId: String!): ChannelIdentity
  unlinkChannelIdentity(value: ChannelIdentityId!): Boolean
  requestCheckpoint(value: AgentSessionId!): Boolean
  updateCheckpointPolicy(onSessionEnd: Boolean!, onUserRequest: Boolean!, timedIntervalTurns: Int, beforeExternalEffect: Boolean!): CheckpointPolicyConfig
  reloadMcpServers(value: Unit!): Boolean
  upsertMcpServer(name: String!, transport: String!, command: String, args: [String!]!, env: [McpEnvVarInput!]!, url: String, enabled: Boolean!): McpServerView
  deleteMcpServer(value: String!): Boolean
  enableSkill(value: String!): Boolean
  disableSkill(value: String!): Boolean
  updateSkillConfig(name: String!, configJson: String!): Boolean
}

type NamedCount {
  name: String!
  count: Int!
}

type OAuthStartResult {
  authUrl: String!
}

type OAuthStatus {
  connected: Boolean!
  expiresAt: Instant
}

type Permission {
  id: PermissionId!
  roleId: RoleId
  userId: UserId
  resource: String!
  action: String!
  scope: String
}

type Personality {
  name: String!
  formality: Formality!
  languages: [String!]!
  expertise: [String!]!
  prompt: String!
}

type Queries {
  user(value: UserId!): User
  users(active: Boolean, nameContains: String, page: Int, pageSize: Int): [User!]
  role(value: RoleId!): Role
  roles(userId: UserId!, page: Int, pageSize: Int): [Role!]
  permissions(userId: UserId!, page: Int, pageSize: Int): [Permission!]
  listSessions(page: Int, pageSize: Int): [AgentSession!]
  serverPersonality: Personality
  listMemory(scope: MemoryScope!, textSearch: String): [MemoryRecord!]
  listCapabilities: [CapabilityGrant!]
  jobs(optAgentId: AgentId): [SchedulerJob!]
  job(value: SchedulerJobId!): SchedulerJob
  triggers(value: SchedulerJobId!): [SchedulerTrigger!]
  listApprovals: [ApprovalRequest!]
  availableModels: [ModelInfo!]
  skills: [SkillInfo!]
  skillConfig(value: String!): String
  contacts(value: String!): [ContactResult!]
  oauthStatus(value: String!): OAuthStatus
  listOAuthProviders: [String!]
  userCapabilityGrants(value: UserId!): [CapabilityGrant!]
  roleCapabilityGrants(value: RoleId!): [CapabilityGrant!]
  userChannelIdentities(value: UserId!): [ChannelIdentity!]
  allRoles(page: Int, pageSize: Int): [Role!]
  checkpointPolicy: CheckpointPolicyConfig
  dashboardStats: DashboardStats
  skillDashboardData(value: String!): String
  mcpServers: [McpServerView!]
  allKnownCapabilities: [CapabilityName!]
  skillValidate(value: String!): SkillValidationResult
}

type ResponseChunk {
  sessionId: AgentSessionId!
  content: String!
  finished: Boolean!
  isError: Boolean!
}

type Role {
  id: RoleId!
  name: String!
  description: String
}

type SchedulerJob {
  id: SchedulerJobId!
  agentId: AgentId!
  userId: UserId!
  skillId: SkillId
  name: String!
  prompt: String!
  inputJson: String
  status: JobStatus!
  scheduledAt: Instant!
  startedAt: Instant
  finishedAt: Instant
  resultJson: String
  maxRetries: Int!
  retryCount: Int!
  backoffSeconds: Int!
  backoffPolicy: RetryBackoffPolicy!
  missedRunPolicy: MissedRunPolicy!
  leasedAt: Instant
  leasedBy: String
  createdAt: Instant!
}

type SchedulerTrigger {
  id: SchedulerTriggerId!
  jobId: SchedulerJobId!
  triggerType: TriggerType!
  expression: String!
  enabled: Boolean!
  createdAt: Instant!
}

type SkillInfo {
  name: String!
  tier: String!
  tools: [SkillToolInfo!]!
  enabled: Boolean!
  keywords: [String!]!
  configKey: String
  configJsModule: String
  dashboardJsModule: String
  hasDashboardData: Boolean!
  oauthProvider: OAuthProvider
}

type SkillToolInfo {
  name: String!
  description: String!
  requiredCapabilities: [String!]!
  examplePrompts: [String!]!
}

type SkillValidationResult {
  ok: Boolean!
  message: String!
}

type Subscriptions {
  approvalNotifications: ApprovalRequest
  eventLogTail: EventLogJson
  agentResponseStream(value: AgentSessionId!): ResponseChunk
  toolEvents(value: AgentSessionId!): ToolEventResult
}

type TimeSeriesPoint {
  timestampMs: Long!
  count: Int!
}

type ToolEventResult {
  sessionId: Long!
  eventType: String!
  toolName: String!
  payload: String!
}

type User {
  id: UserId!
  displayName: String!
  email: String!
  createdAt: Instant!
  updatedAt: Instant!
  active: Boolean!
}

