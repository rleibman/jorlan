<!DOCTYPE html>
<html>
<head>
    <style>
        body { height: 100%; margin: 0; width: 100%; overflow: hidden; }
        #graphiql { height: 100vh; }
    </style>
    <!--
      NOTE: These CDN resources should have Subresource Integrity (SRI) hashes added before
      deploying to production. Compute with: openssl dgst -sha384 -binary <file> | openssl base64 -A
    -->
    <link rel="stylesheet" href="https://unpkg.com/graphiql@3.7.2/graphiql.min.css" />
</head>
<body>
<div id="graphiql">Loading...</div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/graphiql@3.7.2/graphiql.min.js"></script>
<script>
    function graphQLFetcher(graphQLParams) {
        const token = localStorage.getItem('jwtToken');
        return fetch('/api/jorlan', {
            method: 'post',
            const headers = {
                'Accept': 'application/json',
                'Content-Type': 'application/json',
                ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
            };
            return fetch('/api/jorlan', {
                method: 'post',
                headers,
                credentials: 'include',
                body: JSON.stringify(graphQLParams),
            }).then(function(response) {
            return response.text();
        }).then(function(responseBody) {
            try {
                return JSON.parse(responseBody);
            } catch (error) {
                return responseBody;
            }
        });
    }

    const root = ReactDOM.createRoot(document.getElementById('graphiql'));
    root.render(React.createElement(GraphiQL, { fetcher: graphQLFetcher }));
</script>
</body>
</html>
