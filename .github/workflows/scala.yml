# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Scala CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'sbt'

    - name: Setup sbt
      uses: sbt/setup-sbt@v1

    # Cache Ollama model files to avoid re-downloading on every run.
    # llama3.2:1b is the smallest production-quality model that fits in CI RAM (7 GB limit).
    - name: Cache Ollama models
      id: cache-ollama
      uses: actions/cache@v4
      with:
        path: ~/.ollama
        key: ${{ runner.os }}-ollama-llama3.2-1b

    - name: Install Ollama
      uses: ai-action/setup-ollama@v2

    - name: Pull model (cache miss only)
      if: steps.cache-ollama.outputs.cache-hit != 'true'
      run: ollama pull llama3.2:1b

    - name: Run tests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_ACTOR: ${{ github.actor }}
        # Use the small 1b model on CI to stay within the 7 GB RAM limit.
        # The OllamaModelGateway reads this env var via application.conf.
        JORLAN_AI_OLLAMA_MODEL: llama3.2:1b
        # Required env vars for the server to start (tests use FakeModelGateway,
        # so actual DB and auth secret values don't need to be real).
        JORLAN_AUTH_SECRET_KEY: ci-test-secret-key-not-for-production
        JORLAN_DB_URL: jdbc:mariadb://localhost:3306/jorlan
        JORLAN_DB_USER: jorlan
        JORLAN_DB_PASSWORD: jorlan
      run:
        sbt --error test;

  build-packages:
    name: Build installable packages
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'sbt'

    - name: Setup sbt
      uses: sbt/setup-sbt@v1

    - name: Cache npm dependencies (esbuild)
      uses: actions/cache@v4
      with:
        path: web/target/scala-3.8.4/esbuild/main/node_modules
        key: ${{ runner.os }}-npm-esbuild-${{ hashFiles('web/esbuild/package.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-esbuild-

    - name: Build Debian packages (includes web frontend via web/dist)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_ACTOR: ${{ github.actor }}
      run: sbt --error "server/debian:packageBin; shell/debian:packageBin"

    - name: Upload jorlan-server .deb
      uses: actions/upload-artifact@v4
      with:
        name: jorlan-server-deb
        path: server/target/**/*.deb
        if-no-files-found: error

    - name: Upload jorlan-shell .deb
      uses: actions/upload-artifact@v4
      with:
        name: jorlan-shell-deb
        path: shell/target/**/*.deb
        if-no-files-found: error
